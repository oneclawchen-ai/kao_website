<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動報名 | 以數位孿生打造城市治理新模式研討會</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-wrap">
    <a href="index.html" class="nav-brand">
      <div class="nav-brand-mark">DT</div>
      <div class="nav-brand-text">
        <div class="ja">數位孿生・城市治理</div>
        <div class="en">Digital Twin × ESG × Resilience</div>
      </div>
    </a>
    <button class="nav-toggle"><i class="fa-solid fa-bars"></i></button>
    <div class="nav-links">
      <a href="index.html">首頁</a>
      <a href="agenda.html">議程</a>
      <a href="speakers.html">講者陣容</a>
      <a href="exhibition.html">展區導覽</a>
      <a href="sponsors.html">合作夥伴</a>
      <a href="register.html" class="nav-cta">立即報名 <i class="fa-solid fa-arrow-right"></i></a>
    </div>
  </div>
</nav>

<section class="page-banner">
  <div class="breadcrumb">HOME / REGISTRATION</div>
  <h1>報名參與研討會</h1>
  <p>主要邀請南部同仁與南部中小企業廠商參與，共同探索跨域技術應用。</p>
</section>

<section class="section register-section">
  <div class="container">
    <div class="register-wrap">

      <aside class="ticket-panel" id="ticket-panel">
        <h3 style="margin-bottom: 16px; color: var(--deep-ocean); font-size: 20px;">
          <i class="fa-solid fa-ticket" style="color: var(--tech-green);"></i> 參與身分選擇
        </h3>

        <label class="ticket-card selected" data-ticket="內部同仁票">
          <input type="radio" name="ticket" value="內部同仁票" checked hidden>
          <div class="ticket-head">
            <h4>🏢 南部同仁報名</h4>
            <div class="ticket-price">內部交流 <small>／免費</small></div>
          </div>
          <p class="ticket-desc">供內部員工及協辦單位報名參與。</p>
          <ul>
            <li>全日議程入場</li>
            <li>午餐餐盒與茶敘</li>
            <li>展區設備體驗與交流</li>
          </ul>
        </label>

        <label class="ticket-card" data-ticket="企業廠商票">
          <input type="radio" name="ticket" value="企業廠商票" hidden>
          <div class="ticket-head">
            <h4>💼 南部中小企業</h4>
            <div class="ticket-price">受邀廠商 <small>／審核制</small></div>
          </div>
          <p class="ticket-desc">歡迎在地企業廠商報名交流。</p>
          <ul>
            <li>產官學研媒合機會</li>
            <li>全日議程與展區導覽</li>
            <li>技術交流座談</li>
          </ul>
        </label>
      </aside>

      <div class="form-card">
        <h2>報名資料填寫</h2>
        <p>請完整填寫以下欄位，確認後我們將發送行前通知至您的信箱。</p>

        <form id="register-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">姓名<span class="req">*</span></label>
              <input type="text" class="form-input" name="name" required placeholder="請填寫真實姓名">
            </div>
            <div class="form-group">
              <label class="form-label">職稱<span class="req">*</span></label>
              <input type="text" class="form-input" name="title" required placeholder="您的職稱">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">所屬單位 / 企業名稱<span class="req">*</span></label>
            <input type="text" class="form-input" name="organization" required placeholder="如：中華電信 或 ＯＯ科技有限公司">
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Email<span class="req">*</span></label>
              <input type="email" class="form-input" name="email" required placeholder="報到通知將寄至此">
            </div>
            <div class="form-group">
              <label class="form-label">聯絡電話<span class="req">*</span></label>
              <input type="tel" class="form-input" name="phone" required placeholder="手機號碼">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">最感興趣的展區或議題（可複選）</label>
            <div class="chip-group" id="interest-chips">
              <label class="chip"><input type="checkbox" name="interests" value="無人機測繪與VR"> 無人機測繪與VR</label>
              <label class="chip"><input type="checkbox" name="interests" value="數位孿生與GIS"> 數位孿生與GIS</label>
              <label class="chip"><input type="checkbox" name="interests" value="AI 碳盤查 ESG"> AI 碳盤查 ESG</label>
              <label class="chip"><input type="checkbox" name="interests" value="網路韌性通訊"> 網路韌性通訊</label>
              <label class="chip"><input type="checkbox" name="interests" value="AIoT 巡檢"> AIoT 巡檢</label>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">午餐需求</label>
            <select class="form-select" name="dietary">
              <option value="葷食">葷餐盒（無特殊需求）</option>
              <option value="素食">素食餐盒</option>
            </select>
          </div>

          <div class="form-group">
            <label class="check-row" style="background: rgba(0,229,160,0.06);">
              <input type="checkbox" id="agree" required>
              <div>
                <strong>我已確認並同意報名資訊</strong>
                <span>本次報名資料僅供活動身分識別與行前通知使用。</span>
              </div>
            </label>
          </div>

          <button type="submit" class="btn btn-primary btn-block" style="padding: 18px 28px; font-size: 16px;">
            <i class="fa-solid fa-paper-plane"></i> 送出報名
          </button>
        </form>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <div>© 2026 高雄所產官學研研討會. All rights reserved.</div>
      <div>Kaohsiung, Taiwan</div>
    </div>
  </div>
</footer>

<script src="js/common.js"></script>
<script>
// Ticket selection
let currentTicket = '內部同仁票';
document.querySelectorAll('.ticket-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.ticket-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    card.querySelector('input[type=radio]').checked = true;
    currentTicket = card.dataset.ticket;
  });
});

// Chip interactions
function bindChips(container, single = false) {
  if(!container) return;
  container.querySelectorAll('.chip').forEach(chip => {
    const input = chip.querySelector('input');
    input.addEventListener('change', () => {
      if (single) {
        container.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        if (input.checked) chip.classList.add('active');
      } else {
        chip.classList.toggle('active', input.checked);
      }
    });
  });
}
bindChips(document.getElementById('interest-chips'), false);

document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  alert('報名表單已成功送出！這是一個測試確認視窗。');
  window.location.href = 'index.html';
});
</script>
</body>
</html>
